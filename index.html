<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Very Serious Quiz</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <main class="page">
      <div class="background-blob blob-one"></div>
      <div class="background-blob blob-two"></div>
      <div class="background-blob blob-three"></div>

      <section class="card">
        <p class="tiny-text" id="topText">a very serious quiz</p>

        <div class="status-row">
          <span id="questionCounter">ready?</span>
          <span id="scoreCounter">score: 0</span>
        </div>

        <h1 id="title">how well do you know me?</h1>

        <p id="text">
          answer carefully. your future may or may not depend on this hehe :>
        </p>

        <div class="options" id="options">
          <button class="answer-btn primary" id="startBtn">start quiz</button>
        </div>

        <p id="footerText" class="footer-text">
          no pressure. except... there is.
        </p>
      </section>
    </main>

    <script src="index.js"></script>
  </body>
</html>
